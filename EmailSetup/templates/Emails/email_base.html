<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Day Safaris Adventures{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f5f5f5;
            color: #333333;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .header {
            padding: 30px 25px 10px;
            text-align: center;
        }
        
        .logo {
            font-size: 40px;
            margin-bottom: 5px;
        }
        
        .logo-text {
            font-size: 12px;
            color: #666;
            letter-spacing: 1px;
        }
        
        .content {
            padding: 10px 25px 20px;
        }
        
        .footer {
            padding: 20px 25px;
            text-align: center;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #e5e5e5;
            background-color: #fafafa;
        }
        
        .footer a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 5px;
        }
        
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #0066cc;
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
            font-weight: 500;
        }
        
        h2 {
            font-size: 20px;
            font-weight: 500;
            margin: 0 0 15px;
            color: #1c1c1e;
        }
        
        p {
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 15px;
            color: #3a3a3a;
        }
        
        .box {
            background-color: #f9f9f9;
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
        }
        
        hr {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 20px 0;
        }
        
        @media only screen and (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            .header {
                padding: 25px 20px 5px;
            }
            .content, .footer {
                padding: 10px 20px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🦁</div>
            <div class="logo-text">DAY SAFARIS ADVENTURES</div>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="footer">
            <p style="margin-bottom: 10px;">Day Safaris Adventures</p>
            <p style="margin-bottom: 5px;">Nairobi, Kenya</p>
            <p>
                <a href="#">Unsubscribe</a> | 
                <a href="#">Privacy Policy</a> | 
                <a href="#">Terms</a>
            </p>
            <p style="margin-top: 10px; color: #aaa;">© 2025 Day Safaris Adventures. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
