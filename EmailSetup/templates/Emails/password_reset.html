<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #420d24; color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; background: #f9f9f9; }
        .button { display: inline-block; padding: 12px 30px; background: #420d24; color: white; text-decoration: none; border-radius: 5px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reset Your Password</h1>
        </div>
        <div class="content">
            <h2>Hello {{ name }},</h2>
            <p>We received a request to reset your password.</p>
            
            <div style="text-align: center; margin: 30px 0;">
                <a href="{{ reset_link }}" class="button">Reset Password</a>
            </div>
            
            <p>This link expires in 24 hours.</p>
            <p>If you didn't request this, ignore this email.</p>
            <p>The Day Safaris Team</p>
        </div>
        <div class="footer">
            <p>&copy; 2025 Day Safaris Adventures</p>
        </div>
    </div>
</body>
</html>
