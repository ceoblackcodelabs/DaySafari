<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Newsletter</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #420d24; color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; background: #f9f9f9; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Day Safaris Newsletter 🦁</h1>
        </div>
        <div class="content">
            <h2>Hello {{ name }}!</h2>
            {{ content|safe }}
            <p><a href="https://daysafarisadventures.co.ke">Visit our website</a></p>
            <p>Best regards,<br>The Day Safaris Team</p>
        </div>
        <div class="footer">
            <p>&copy; 2025 Day Safaris Adventures</p>
        </div>
    </div>
</body>
</html>
